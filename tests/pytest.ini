[pytest]
# Pytest configuration for Zolve backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test organization
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    unit: marks tests as unit tests
    slow: marks tests as slow (deselect with '-m "not slow"')
    bank: marks tests related to bank functionality
    marketplace: marks tests related to Z-Kart marketplace
    coins: marks tests related to coin earning
    sinks: marks tests related to spending sinks

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout for tests (seconds)
timeout = 30

# Minimum Python version
minversion = 3.8
